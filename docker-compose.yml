# Local development infrastructure (GEC-8).
# pgvector/pgvector:pg16 is plain Postgres 16 + pgvector — dev/prod parity with
# Render's managed Postgres (no TimescaleDB). Time-series uses native Postgres
# (GEC-12); pgvector powers NL retrieval (GEC-13).

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gigmann
      POSTGRES_PASSWORD: gigmann
      POSTGRES_DB: gigmann
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigmann -d gigmann"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # The API auto-applies migrations + first-run-seeds on boot (no separate seed
  # step). Frontend runs via `npm run dev` (proxying /api → :8080) in dev.
  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      JWT_SECRET: dev-insecure-change-me
      DATABASE_URL: postgres://gigmann:gigmann@postgres:5432/gigmann?sslmode=disable
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  pgdata:
  redisdata:
