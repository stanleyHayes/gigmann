# Render Blueprint (Infrastructure as Code) — GEC-105.
# Declares the API, frontend, Redis, and Postgres for the cockpit.
#
# Data layer (RESOLVED — agent_plan.md OQ-4): Render-managed Postgres 16 +
# pgvector. TimescaleDB is dropped (unsupported on Render). Time-series uses
# native Postgres (indexes now; range partitioning + materialized views if
# volume grows). Enable pgvector via `CREATE EXTENSION vector` in migration 1.

services:
  - type: web
    name: gigmann-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: HTTP_PORT
        value: "8080"
      - key: CORS_ALLOWED_ORIGINS
        value: https://gigmann-frontend.onrender.com
      - fromGroup: gigmann-secrets
      # DATABASE_URL / REDIS_URL are re-enabled when persistence lands
      # (GEC-11/12/13). The demo runs fully in-memory from the seeded
      # synthetic network, so the API needs neither to boot.

  # Redis is provisioned with persistence/clustered rate-limiting (GEC-11/74).
  # - type: redis
  #   name: gigmann-redis
  #   plan: starter
  #   maxmemoryPolicy: noeviction
  #   ipAllowList: []

  - type: web
    name: gigmann-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gigmann-api.onrender.com

  # Morning brief pre-warm (GEC-71). Enable once the worker entrypoint exists
  # (E8). Until then this is intentionally commented out to keep the Blueprint
  # deployable.
  # - type: cron
  #   name: gigmann-prewarm
  #   runtime: docker
  #   rootDir: backend
  #   dockerfilePath: ./Dockerfile
  #   schedule: "0 5 * * *"   # 05:00 UTC daily
  #   dockerCommand: /worker prewarm
  #   envVars:
  #     - fromGroup: gigmann-secrets

# Postgres (pgvector) is provisioned with the persistence layer (GEC-11/12/13).
# databases:
#   - name: gigmann-postgres
#     plan: basic-256mb
#     postgresMajorVersion: "16"

envVarGroups:
  - name: gigmann-secrets
    envVars:
      - key: ANTHROPIC_API_KEY # optional — local narrator fallback when unset
        sync: false
      - key: JWT_SECRET # required: HS256 token-signing secret
        sync: false
      - key: DEMO_PASSWORD # optional — seed login password (defaults otherwise)
        sync: false
