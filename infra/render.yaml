# Render Blueprint (Infrastructure as Code) — GEC-105.
# Declares the API, frontend, Redis, and Postgres for the cockpit.
#
# Data layer (RESOLVED — agent_plan.md OQ-4): Render-managed Postgres 16 +
# pgvector. TimescaleDB is dropped (unsupported on Render). Time-series uses
# native Postgres (indexes now; range partitioning + materialized views if
# volume grows). Enable pgvector via `CREATE EXTENSION vector` in migration 1.

services:
  - type: web
    name: gigmann-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: HTTP_PORT
        value: "8080"
      - key: CORS_ALLOWED_ORIGINS
        value: https://gigmann-frontend.onrender.com
      - key: TRUST_PROXY
        # Render terminates TLS at a proxy, so the real client IP is in
        # X-Forwarded-For. Honour it so per-IP login/refresh rate limiting works
        # (without this, every request looks like the proxy and shares one bucket).
        value: "true"
      - fromGroup: gigmann-secrets
      # PRODUCTION PERSISTENCE (one-step enable): uncomment the Postgres database
      # + Redis service below AND the two vars here. Without them the API boots on
      # EPHEMERAL in-memory repos (fine for the free demo; state is lost on restart
      # and cannot scale past one instance).
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: gigmann-postgres
      #     property: connectionString
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: gigmann-redis
      #     property: connectionString

  # Redis is provisioned with persistence/clustered rate-limiting (GEC-11/74).
  # - type: redis
  #   name: gigmann-redis
  #   plan: starter
  #   maxmemoryPolicy: noeviction
  #   ipAllowList: []

  - type: web
    name: gigmann-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self'; connect-src 'self' https://gigmann-api.onrender.com
          wss://gigmann-api.onrender.com; script-src 'self'
          'sha256-ysmUPGRfOzBRdt8rbk41dY39am4yNNfomvV8iE5Cn5Q=';
          style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:;
          worker-src 'self'; manifest-src 'self'; base-uri 'none'; form-action 'self';
          frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=(), browsing-topics=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: same-origin
      - path: /*
        name: Origin-Agent-Cluster
        value: "?1"
      - path: /*
        name: X-DNS-Prefetch-Control
        value: off
      - path: /*
        name: X-Permitted-Cross-Domain-Policies
        value: none
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gigmann-api.onrender.com

  # Materialized-view refresh (GEC-71/GEC-12). The worker entrypoint (cmd/worker)
  # exists and is built into the image (/worker). Enable alongside Postgres
  # (needs DATABASE_URL from the env group); commented while the demo runs
  # in-memory to keep the Blueprint free + deployable.
  # - type: cron
  #   name: gigmann-refresh-views
  #   runtime: docker
  #   rootDir: backend
  #   dockerfilePath: ./Dockerfile
  #   schedule: "0 5 * * *"   # 05:00 UTC daily
  #   dockerCommand: /worker refresh-views
  #   envVars:
  #     - fromGroup: gigmann-secrets

# Postgres (pgvector) is provisioned with the persistence layer (GEC-11/12/13).
# databases:
#   - name: gigmann-postgres
#     plan: basic-256mb
#     postgresMajorVersion: "16"

envVarGroups:
  - name: gigmann-secrets
    envVars:
      - key: ANTHROPIC_API_KEY # optional — local narrator fallback when unset
        sync: false
      - key: VOYAGE_API_KEY # optional — local (lexical) embedder fallback when unset
        sync: false
      - key: JWT_SECRET # required outside dev: HS256 signing secret, >=32 chars (validated at boot)
        sync: false
      - key: DEMO_PASSWORD # optional — seed login password (defaults otherwise)
        sync: false
      - key: VAPID_PUBLIC_KEY # optional — Web Push; push is a no-op when unset
        sync: false
      - key: VAPID_PRIVATE_KEY # optional — Web Push private key
        sync: false
      - key: VAPID_SUBJECT # optional — Web Push contact, e.g. mailto:ops@gigmann.health
        sync: false
      - key: SENTRY_DSN # optional — error tracking; no-op when unset
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT # optional — OTLP traces; no-op when unset
        sync: false
