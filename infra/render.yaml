# Render Blueprint (Infrastructure as Code) — GEC-105.
# Declares the Go API and its Postgres database. The SPA is NOT here: it is
# hosted on Vercel (https://gigmann.vercel.app) — see frontend/vercel.json.
#
# Data layer (RESOLVED — agent_plan.md OQ-4): Render-managed Postgres 18 +
# pgvector. TimescaleDB is dropped (unsupported on Render). Time-series uses
# native Postgres (indexes now; range partitioning + materialized views if
# volume grows). Enable pgvector via `CREATE EXTENSION vector` in migration 1.

services:
  - type: web
    name: gigmann-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: HTTP_PORT
        value: "8080"
      - key: CORS_ALLOWED_ORIGINS
        # The SPA is hosted on Vercel; the API and its Postgres stay here.
        # Comma-separated allow-list — add more origins here if you keep another
        # frontend deployment alive. NOTE: Vercel preview deployments get dynamic
        # per-branch URLs that a static allow-list cannot match, so previews
        # cannot call this production API.
        value: https://gigmann.vercel.app
      - key: TRUST_PROXY
        # Render terminates TLS at a proxy, so the real client IP is in
        # X-Forwarded-For. Honour it so per-IP login/refresh rate limiting works
        # (without this, every request looks like the proxy and shares one bucket).
        value: "true"
      - fromGroup: gigmann-secrets
      # PERSISTENCE: the API is now Postgres-backed. On boot it runs the embedded
      # migrations (advisory-locked, idempotent — internal/bootstrap) which create
      # the pgvector extension and seed the synthetic network on first run, so no
      # manual migrate step is needed. If this var is ever removed the API silently
      # falls back to EPHEMERAL in-memory repos (state lost on restart) and logs a
      # WARN outside development.
      # `connectionString` is the INTERNAL URL (same-region, no egress) — correct
      # for this service. For access from your laptop use the EXTERNAL connection
      # string shown in the Render dashboard (enabled by ipAllowList below).
      - key: DATABASE_URL
        fromDatabase:
          name: gigmann-postgres
          property: connectionString

  # Redis is OPTIONAL — it backs clustered rate limiting + refresh-token storage
  # (GEC-11/74). Without it those fall back to in-process state, which is correct
  # on a single instance. Left off to keep the Blueprint free; uncomment (and add
  # the REDIS_URL var above) when scaling past one instance.
  # - type: keyvalue
  #   name: gigmann-redis
  #   plan: free
  #   maxmemoryPolicy: noeviction
  #   ipAllowList: []
  #   (then add under the API's envVars:)
  #   - key: REDIS_URL
  #     fromService:
  #       type: keyvalue
  #       name: gigmann-redis
  #       property: connectionString

  # Materialized-view refresh (GEC-71/GEC-12). The worker entrypoint (cmd/worker)
  # exists and is built into the image (/worker). Enable alongside Postgres
  # (needs DATABASE_URL from the env group); commented while the demo runs
  # in-memory to keep the Blueprint free + deployable.
  # - type: cron
  #   name: gigmann-refresh-views
  #   runtime: docker
  #   rootDir: backend
  #   dockerfilePath: ./Dockerfile
  #   schedule: "0 5 * * *"   # 05:00 UTC daily
  #   dockerCommand: /worker refresh-views
  #   envVars:
  #     - fromGroup: gigmann-secrets

# Postgres (pgvector) — the persistence layer (GEC-11/12/13).
databases:
  - name: gigmann-postgres
    # ⚠️  FREE TIER: Render EXPIRES a free Postgres instance ~30 days after it is
    # created and then DELETES it — the data is not recoverable. Accepted for the
    # demo; the API degrades to ephemeral in-memory repos if the database goes
    # away. Before this matters, either take a dump (`pg_dump` via the external
    # connection string) or move to `basic-256mb`, the cheapest plan that
    # persists indefinitely. Same one-word change on the web service above, which
    # on `free` also cold-starts (~30-60s) after ~15 minutes idle.
    plan: free
    postgresMajorVersion: "18"
    databaseName: gigmann
    user: gigmann
    # EXTERNAL ACCESS: an ipAllowList entry is what makes the database reachable
    # from outside Render (psql/TablePlus/DBeaver from your laptop). Render then
    # shows an "External Connection String" in the dashboard — use that one; the
    # `connectionString` injected into the API above is the internal URL.
    #
    # ⚠️  0.0.0.0/0 means ANY host on the internet can reach the port. The database
    # is still password-protected, but this is the widest possible exposure. Once
    # you know the address you connect from, replace it with `<your.ip>/32`
    # (find it with: curl -s https://api.ipify.org). Render allows editing this
    # list in the dashboard without a redeploy.
    ipAllowList:
      - source: 0.0.0.0/0
        description: external access (RESTRICT to your own IP/32 when you can)

envVarGroups:
  - name: gigmann-secrets
    envVars:
      - key: ANTHROPIC_API_KEY # optional — local narrator fallback when unset
        sync: false
      - key: VOYAGE_API_KEY # optional — local (lexical) embedder fallback when unset
        sync: false
      - key: JWT_SECRET # required outside dev: HS256 signing secret, >=32 chars (validated at boot)
        sync: false
      - key: DEMO_PASSWORD # optional — seed login password (defaults otherwise)
        sync: false
      - key: VAPID_PUBLIC_KEY # optional — Web Push; push is a no-op when unset
        sync: false
      - key: VAPID_PRIVATE_KEY # optional — Web Push private key
        sync: false
      - key: VAPID_SUBJECT # optional — Web Push contact, e.g. mailto:ops@gigmann.health
        sync: false
      - key: SENTRY_DSN # optional — error tracking; no-op when unset
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT # optional — OTLP traces; no-op when unset
        sync: false
