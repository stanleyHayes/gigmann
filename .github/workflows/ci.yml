name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, test, coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      # golangci-lint v2 (matches backend/.golangci.yml `version: "2"`).
      # NOTE: keep this action major in sync with golangci-lint v2.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # Pinned (not `latest`): a floating linter silently introduces new
          # checks on each release and red-fails CI on unrelated commits.
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m

      - name: govulncheck (Go vulnerability scan)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Test (race) + coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out ./internal/...
          grep -vE '(_gen\.go|\.gen\.go|/bootstrap/|/mocks/|/adapters/outbound/postgres/|/adapters/outbound/anthropic/)' coverage.out > coverage.filtered.out

      - name: Coverage gate (>= 80%, generated code excluded)
        run: |
          total=$(go tool cover -func=coverage.filtered.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Backend coverage (excl. generated): ${total}%"
          awk -v t="$total" 'BEGIN{ exit !(t+0 >= 80.0) }' \
            || { echo "::error::Coverage ${total}% is below the 80% gate"; exit 1; }

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  frontend:
    name: Frontend — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Pinned to 20 (matches e2e/lighthouse). Node 22+ exposes an experimental
          # global localStorage that shadows jsdom and breaks the unit tests.
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

  sonarqube:
    name: SonarQube quality gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ github.actor != 'dependabot[bot]' }}
    # SONAR_TOKEN is mapped to job-level env so the steps below can gate on it:
    # without the secret the scan is skipped (green) rather than hard-failing; once
    # the secret is set the quality gate runs and is enforced (CLAUDE.md §5).
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0
      - name: Download backend coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - name: Download frontend coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: SonarQube scan + quality gate
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-scan-action@v6
      - name: Skipped (no SONAR_TOKEN configured)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SonarQube skipped — set the SONAR_TOKEN (and SONAR_HOST_URL) secret to enable the quality gate."

  codegen-drift:
    name: OpenAPI codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.x # pinned (match the backend job) — `stable` can flip Go major and make gofmt-formatted codegen drift
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: go -C backend mod download
      - run: npm --prefix frontend ci
      - name: Regenerate from the OpenAPI spec
        run: make generate
      - name: Fail if generated code is stale
        run: |
          git diff --exit-code -- \
            backend/internal/adapters/inbound/httpapi/openapi_gen.go \
            backend/internal/adapters/outbound/postgres/sqlcgen \
            frontend/src/api/schema.d.ts \
            || { echo "::error::Generated code is stale — run 'make generate' and commit the result"; exit 1; }

  integration:
    name: Backend integration (testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.x # pinned (match the backend job) — `stable` can flip Go major and make gofmt-formatted codegen drift
          cache-dependency-path: backend/go.sum
      - run: go test -tags=integration -race ./...

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: SBOM (SPDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t gigmann-api:ci backend
      # Run Trivy from its pinned official image rather than the action's
      # self-install flow (contrib/install.sh), which is GitHub-rate-limit-prone
      # and broke CI. GITHUB_TOKEN avoids anonymous rate limits on the vuln-DB pull.
      - name: Trivy image scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull with retry first (Docker Hub can transiently EOF/rate-limit), so the
          # run below fails only on a real Trivy finding — not a flaky registry pull.
          for i in 1 2 3; do docker pull aquasec/trivy:0.65.0 && break || { echo "pull retry $i"; sleep 15; }; done
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            -e GITHUB_TOKEN \
            aquasec/trivy:0.65.0 image \
              --no-progress --exit-code 1 --ignore-unfixed \
              --severity HIGH,CRITICAL --format table \
              gigmann-api:ci
