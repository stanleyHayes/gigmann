name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, test, coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      # golangci-lint v2 (matches backend/.golangci.yml `version: "2"`).
      # NOTE: keep this action major in sync with golangci-lint v2.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      - name: Test (race) + coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out ./internal/...
          grep -vE '(_gen\.go|\.gen\.go|/bootstrap/|/mocks/|/adapters/outbound/postgres/|/adapters/outbound/anthropic/)' coverage.out > coverage.filtered.out

      - name: Coverage gate (>= 80%, generated code excluded)
        run: |
          total=$(go tool cover -func=coverage.filtered.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Backend coverage (excl. generated): ${total}%"
          awk -v t="$total" 'BEGIN{ exit !(t+0 >= 80.0) }' \
            || { echo "::error::Coverage ${total}% is below the 80% gate"; exit 1; }

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  frontend:
    name: Frontend — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          check-latest: true
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

  sonarqube:
    name: SonarQube quality gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: SonarQube scan + quality gate
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  codegen-drift:
    name: OpenAPI codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          check-latest: true
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: go -C backend mod download
      - run: npm --prefix frontend ci
      - name: Regenerate from the OpenAPI spec
        run: make generate
      - name: Fail if generated code is stale
        run: |
          git diff --exit-code -- \
            backend/internal/adapters/inbound/httpapi/openapi_gen.go \
            backend/internal/adapters/outbound/postgres/sqlcgen \
            frontend/src/api/schema.d.ts \
            || { echo "::error::Generated code is stale — run 'make generate' and commit the result"; exit 1; }

  integration:
    name: Backend integration (testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: backend/go.sum
      - run: go test -tags=integration -race ./...
