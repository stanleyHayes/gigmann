name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'Features'
    labels: ['feature', 'enhancement']
  - title: 'Fixes'
    labels: ['fix', 'bug']
  - title: 'Docs'
    labels: ['docs', 'documentation']
  - title: 'Chores & CI'
    labels: ['chore', 'ci', 'dependencies']
change-template: '- $TITLE (#$NUMBER)'
version-resolver:
  major: { labels: ['major'] }
  minor: { labels: ['minor', 'feature', 'enhancement'] }
  patch: { labels: ['patch', 'fix', 'bug', 'chore'] }
  default: patch
template: |
  ## Changes
  $CHANGES
