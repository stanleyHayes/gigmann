sonar.projectKey=gigmann-cockpit
sonar.projectName=Gigmann Executive Cockpit

# Sources & tests
sonar.sources=backend,frontend/src
sonar.tests=backend,frontend/src
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/*_test.go,**/cmd/**,**/*.gen.go,frontend/dist/**,frontend/coverage/**,**/node_modules/**

# Coverage reports (produced in CI)
sonar.go.coverage.reportPaths=backend/coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Language settings
sonar.sourceEncoding=UTF-8
