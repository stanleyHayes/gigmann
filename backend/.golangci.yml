# golangci-lint configuration (v2 schema).
# Hexagonal import boundaries are additionally enforced by
# internal/architecture/arch_test.go (version-independent).
version: "2"

linters:
  default: standard
  enable:
    - revive
    - gosec
    - errorlint
    - bodyclose
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
