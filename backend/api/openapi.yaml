openapi: 3.0.3
info:
  title: Gigmann Executive Cockpit API
  version: 0.1.0
  description: >
    REST API for the Gigmann Executive Cockpit. Contract-first: the Go server
    interfaces and the TypeScript client are generated from this file
    (`make generate`). Do not hand-edit generated code.
servers:
  - url: /
    description: Same-origin (served behind the SPA / API gateway)

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /api/v1/facilities:
    get:
      operationId: listFacilities
      summary: List all facilities in the network
      tags: [facilities]
      responses:
        '200':
          description: The facilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityList'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/brief:
    get:
      operationId: getBrief
      summary: The AI-narrated Daily Brief over the current network
      tags: [brief]
      responses:
        '200':
          description: The Daily Brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brief'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/metrics:
    get:
      operationId: getMetrics
      summary: Deterministic network KPIs and weekly trends
      tags: [metrics]
      responses:
        '200':
          description: Network KPIs and trends
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkMetrics'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    FacilityStatus:
      type: string
      enum: [good, watch, critical]
      description: AI-assessed operational health signal.

    Facility:
      type: object
      required: [id, name, region, town, beds, status]
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
        town:
          type: string
        beds:
          type: integer
          format: int32
        status:
          $ref: '#/components/schemas/FacilityStatus'

    FacilityList:
      type: object
      required: [facilities]
      properties:
        facilities:
          type: array
          items:
            $ref: '#/components/schemas/Facility'

    Brief:
      type: object
      required: [id, date, prose, model, items]
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        prose:
          type: string
        model:
          type: string
        generated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/BriefItem'

    BriefItem:
      type: object
      required: [severity, facility_id, headline]
      properties:
        severity:
          $ref: '#/components/schemas/FacilityStatus'
        facility_id:
          type: string
        headline:
          type: string
        explanation:
          type: string
        suggested_actions:
          type: array
          items:
            type: string

    MetricPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
          format: date
        value:
          type: number
          format: double

    Kpi:
      type: object
      required: [key, label, unit, higher_is_better, current, previous, delta_pct, direction, series]
      properties:
        key:
          type: string
        label:
          type: string
        unit:
          type: string
          enum: [pesewas, ratio, count]
        higher_is_better:
          type: boolean
        current:
          type: number
          format: double
        previous:
          type: number
          format: double
        delta_pct:
          type: number
          format: double
        direction:
          type: string
          enum: [up, down, flat]
        series:
          type: array
          items:
            $ref: '#/components/schemas/MetricPoint'

    NetworkMetrics:
      type: object
      required: [as_of, kpis]
      properties:
        as_of:
          type: string
          format: date
        kpis:
          type: array
          items:
            $ref: '#/components/schemas/Kpi'

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
