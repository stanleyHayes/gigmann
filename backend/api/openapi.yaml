openapi: 3.0.3
info:
  title: Gigmann Executive Cockpit API
  version: 0.1.0
  description: >
    REST API for the Gigmann Executive Cockpit. Contract-first: the Go server
    interfaces and the TypeScript client are generated from this file
    (`make generate`). Do not hand-edit generated code.
servers:
  - url: /
    description: Same-origin (served behind the SPA / API gateway)

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /api/v1/facilities:
    get:
      operationId: listFacilities
      summary: List all facilities in the network
      tags: [facilities]
      responses:
        '200':
          description: The facilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityList'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/facilities/search:
    get:
      operationId: searchFacilities
      summary: Resolve a natural-language phrase to facilities via vector similarity
      tags: [facilities]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        '200':
          description: Ranked facility matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilitySearchResults'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/brief:
    get:
      operationId: getBrief
      summary: The AI-narrated Daily Brief over the current network
      tags: [brief]
      responses:
        '200':
          description: The Daily Brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brief'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/metrics:
    get:
      operationId: getMetrics
      summary: Deterministic network KPIs and weekly trends
      tags: [metrics]
      responses:
        '200':
          description: Network KPIs and trends
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkMetrics'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/login:
    post:
      operationId: postAuthLogin
      summary: Exchange email and password for an access token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      operationId: getAuthMe
      summary: The current authenticated user
      tags: [auth]
      responses:
        '200':
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/me/preferences:
    get:
      operationId: getMePreferences
      summary: The current user's personalisation preferences
      tags: [me]
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      operationId: updateMePreferences
      summary: Update the current user's personalisation preferences
      tags: [me]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Preferences'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/refresh:
    post:
      operationId: postAuthRefresh
      summary: Rotate a refresh token into a new access + refresh token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Rotated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      operationId: postAuthLogout
      summary: Revoke a refresh token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logged out

  /api/v1/approvals:
    get:
      operationId: listApprovals
      summary: Approvals routed to the executive
      tags: [approvals]
      responses:
        '200':
          description: The approvals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/approvals/{approvalId}/decision:
    post:
      operationId: decideApproval
      summary: Approve or decline a pending approval (explicit, user-initiated)
      tags: [approvals]
      parameters:
        - name: approvalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRequest'
      responses:
        '200':
          description: The decided approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Approval'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/tasks:
    get:
      operationId: listTasks
      summary: The executive's "My Day" tasks
      tags: [tasks]
      responses:
        '200':
          description: The tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/tasks/{taskId}/status:
    post:
      operationId: updateTaskStatus
      summary: Update a task's status
      tags: [tasks]
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskStatusRequest'
      responses:
        '200':
          description: The updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/alerts:
    get:
      operationId: listAlerts
      summary: The ranked, cursor-paginated attention feed (open alerts, worst first)
      tags: [alerts]
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: The attention feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertFeed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/alerts/{alertId}:
    patch:
      operationId: updateAlertStatus
      summary: Dismiss or resolve an alert
      tags: [alerts]
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertStatusUpdate'
      responses:
        '200':
          description: The updated alert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/drafts:
    post:
      operationId: createDraft
      summary: Generate an AI-drafted message or summary (read-only — never sent without explicit user action)
      tags: [drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftRequest'
      responses:
        '200':
          description: The generated draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/ask:
    post:
      operationId: postAsk
      summary: Ask a natural-language question about the network
      tags: [ask]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: The grounded answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Answer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/facilities/{facilityId}:
    get:
      operationId: getFacility
      summary: Facility drill-down (inventory, staff, alerts)
      tags: [facilities]
      parameters:
        - name: facilityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The facility detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/mfa/enroll:
    post:
      operationId: postAuthMfaEnroll
      summary: Begin TOTP enrollment (returns a secret + otpauth URI)
      tags: [auth]
      responses:
        '200':
          description: Enrollment secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaEnrollment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/mfa/confirm:
    post:
      operationId: postAuthMfaConfirm
      summary: Confirm TOTP enrollment with a code
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaConfirmRequest'
      responses:
        '204':
          description: MFA enrolled
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    FacilityStatus:
      type: string
      enum: [good, watch, critical]
      description: AI-assessed operational health signal.

    Facility:
      type: object
      required: [id, name, region, town, beds, status]
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
        town:
          type: string
        beds:
          type: integer
          format: int32
        status:
          $ref: '#/components/schemas/FacilityStatus'

    FacilityList:
      type: object
      required: [facilities]
      properties:
        facilities:
          type: array
          items:
            $ref: '#/components/schemas/Facility'

    FacilityMatch:
      type: object
      required: [facilityId, name, score]
      properties:
        facilityId:
          type: string
        name:
          type: string
        score:
          type: number
          format: double
          description: Cosine similarity in [0,1]; 1 is identical.
    FacilitySearchResults:
      type: object
      required: [query, matches]
      properties:
        query:
          type: string
        matches:
          type: array
          items:
            $ref: '#/components/schemas/FacilityMatch'

    Preferences:
      type: object
      required: [watched_metrics, thresholds]
      properties:
        watched_metrics:
          type: array
          items:
            type: string
        thresholds:
          type: object
          additionalProperties:
            type: number
            format: double

    AlertFeed:
      type: object
      required: [alerts]
      properties:
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/AlertItem'
        next_cursor:
          type: string
    AlertStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [dismissed, resolved]

    DraftRequest:
      type: object
      required: [kind, instruction]
      properties:
        kind:
          type: string
          enum: [message, summary]
        facility_id:
          type: string
        instruction:
          type: string
          minLength: 1
    Draft:
      type: object
      required: [kind, draft]
      properties:
        kind:
          type: string
        facility_id:
          type: string
        draft:
          type: string

    Brief:
      type: object
      required: [id, date, prose, model, items]
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        prose:
          type: string
        model:
          type: string
        generated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/BriefItem'

    BriefItem:
      type: object
      required: [severity, facility_id, headline]
      properties:
        severity:
          $ref: '#/components/schemas/FacilityStatus'
        facility_id:
          type: string
        headline:
          type: string
        explanation:
          type: string
        suggested_actions:
          type: array
          items:
            type: string

    MetricPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
          format: date
        value:
          type: number
          format: double

    Kpi:
      type: object
      required: [key, label, unit, higher_is_better, current, previous, delta_pct, direction, series]
      properties:
        key:
          type: string
        label:
          type: string
        unit:
          type: string
          enum: [pesewas, ratio, count]
        higher_is_better:
          type: boolean
        current:
          type: number
          format: double
        previous:
          type: number
          format: double
        delta_pct:
          type: number
          format: double
        direction:
          type: string
          enum: [up, down, flat]
        series:
          type: array
          items:
            $ref: '#/components/schemas/MetricPoint'

    NetworkMetrics:
      type: object
      required: [as_of, kpis]
      properties:
        as_of:
          type: string
          format: date
        kpis:
          type: array
          items:
            $ref: '#/components/schemas/Kpi'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        code:
          type: string

    AuthUser:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [executive, facility_manager]
        facility_id:
          type: string

    AuthSession:
      type: object
      required: [token, refresh_token, user]
      properties:
        token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    Approval:
      type: object
      required: [id, type, facility_id, amount_pesewas, title, requested_by, status, created_at]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [capital, hire, reorder]
        facility_id:
          type: string
        amount_pesewas:
          type: integer
          format: int64
        title:
          type: string
        context:
          type: string
        requested_by:
          type: string
        status:
          type: string
          enum: [pending, approved, declined]
        decided_at:
          type: string
          format: date-time
        decision_note:
          type: string
        created_at:
          type: string
          format: date-time

    ApprovalList:
      type: object
      required: [approvals]
      properties:
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/Approval'

    DecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, decline]
        note:
          type: string

    Task:
      type: object
      required: [id, title, priority, status, source, created_at]
      properties:
        id:
          type: string
        title:
          type: string
        detail:
          type: string
        facility_id:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [todo, in_progress, done]
        due_date:
          type: string
          format: date
        assigned_to:
          type: string
        source:
          type: string
          enum: [manual, brief, alert]
        created_at:
          type: string
          format: date-time

    TaskList:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    TaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [todo, in_progress, done]

    AskRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1

    Answer:
      type: object
      required: [text]
      properties:
        text:
          type: string
        citations:
          type: array
          items:
            type: string

    InventoryItem:
      type: object
      required: [id, name, category, stock_level, stockout_imminent]
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        stock_level:
          type: integer
          format: int32
        days_of_stock:
          type: number
          format: double
        stockout_imminent:
          type: boolean

    StaffMember:
      type: object
      required: [id, name, role, status, attrition_risk]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        status:
          type: string
        attrition_risk:
          type: number
          format: double
        licence_expiry:
          type: string
          format: date

    AlertItem:
      type: object
      required: [id, type, severity, title, status]
      properties:
        id:
          type: string
        facility_id:
          type: string
        type:
          type: string
        severity:
          $ref: '#/components/schemas/FacilityStatus'
        title:
          type: string
        detail:
          type: string
        status:
          type: string

    FacilityDetail:
      type: object
      required: [facility, inventory, staff, alerts]
      properties:
        facility:
          $ref: '#/components/schemas/Facility'
        inventory:
          type: array
          items:
            $ref: '#/components/schemas/InventoryItem'
        staff:
          type: array
          items:
            $ref: '#/components/schemas/StaffMember'
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/AlertItem'

    MfaEnrollment:
      type: object
      required: [secret, otpauth_uri]
      properties:
        secret:
          type: string
        otpauth_uri:
          type: string

    MfaConfirmRequest:
      type: object
      required: [secret, code]
      properties:
        secret:
          type: string
        code:
          type: string

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: The request was malformed or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: The principal is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: The resource is in a conflicting state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
