version: "2"
sql:
  - engine: postgresql
    schema:
      - "migrations/000001_init.up.sql"
      - "migrations/000002_auth.up.sql"
      - "migrations/000005_mfa_recovery_codes.up.sql"
    queries: "internal/adapters/outbound/postgres/queries"
    gen:
      go:
        package: sqlcgen
        out: "internal/adapters/outbound/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
